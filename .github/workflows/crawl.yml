name: Weekly Tool Status Crawl

on:
  schedule:
    - cron: "0 2 * * 1"   # Every Monday at 02:00 UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install tsx
        run: npm install -g tsx

      - name: Run crawler
        run: npx tsx scripts/crawl-check.ts

      - name: Commit updated tool-status.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/tool-status.json
          git diff --staged --quiet || git commit -m "chore: update tool-status.json [skip ci]"
          git push
